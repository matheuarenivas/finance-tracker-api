# ============================
# Production profile
# Activate with: --spring.profiles.active=prod
# ============================

# Swap to your real database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:financetrackerdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Disable H2 console in production
spring.h2.console.enabled=false

# Flyway — enabled in production
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Don't run seed data in production
spring.sql.init.mode=never

# Response compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024

# Tighter pool for production
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.leak-detection-threshold=60000

# CORS — override for production
# app.cors.allowed-origins=https://yourdomain.com

# Actuator — restrict in production
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# OIDC — JWT validation via provider's JWKS endpoint
spring.security.oauth2.resourceserver.jwt.issuer-uri=${OIDC_ISSUER_URI}
