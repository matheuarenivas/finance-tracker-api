# ============================
# Application
# ============================
spring.application.name=finance-tracker-api
server.port=8080
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ============================
# Flyway — database migrations
# ============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ============================
# Connection pool (HikariCP)
# ============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ============================
# Actuator
# ============================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
info.app.name=${spring.application.name}
info.app.version=0.0.1-SNAPSHOT
info.app.description=Finance Tracker REST API

# ============================
# Response compression
# ============================
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024

# ============================
# SpringDoc OpenAPI
# ============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ============================
# OIDC — JWT validation via provider's JWKS endpoint
# ============================
spring.security.oauth2.resourceserver.jwt.issuer-uri=${OIDC_ISSUER_URI:https://accounts.google.com}

# ============================
# Default profile — activate local for development
# ============================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
